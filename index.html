<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; max-width:700px; margin:auto; padding:10px; }
button, select { width:100%; padding:12px; margin:6px 0; font-size:16px; }
img { width:100%; margin-top:10px; border:1px solid #ccc; }
#info { margin-top:10px; border-top:1px solid #ddd; padding-top:10px; }
.small { font-size:13px; color:#666; }
</style>
</head>

<body>

<h2>Southern Africa Bird Sound Game</h2>

<button id="langBtn" onclick="toggleLang()">Afrikaans</button>
<div class="small">Toggle bird names only</div>

<label>Habitat:</label>
<select id="habitat"></select>

<label>Hotspot:</label>
<select id="hotspot"></select>

<label>Bird Group:</label>
<select id="group"></select>

<label>Level:</label>
<select id="level"></select>

<button onclick="startGame()">Start</button>
<button onclick="reviewMode()" style="background:#ffd166;">Review Mistakes</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<img id="spectrogram">

<div id="options"></div>

<div id="info"></div>

<button onclick="nextBird()">Next</button>

</div>

<script src="birds.js"></script>

<script>

// ================= STATE =================
let lang = "en";
let filtered=[], queue=[], current=null, wrong=[];
let audio = new Audio();

// ================= LANGUAGE =================
function toggleLang(){
  lang = (lang==="en") ? "af" : "en";

  // 🔥 change button text
  document.getElementById("langBtn").textContent =
    (lang==="en") ? "Afrikaans" : "English";

  nextBird();
}

// ================= AUDIO =================
function playAudio(file){
  audio.pause();
  audio.src=file;
  audio.load();
  audio.play().catch(()=>{});
}

function togglePlay(){
  audio.paused ? audio.play() : audio.pause();
}

// ================= DROPDOWNS =================
function fill(id,key){
  let set=new Set();

  birds.forEach(b=>{
    if(b[key]){
      b[key].split(";").forEach(v=>set.add(v.trim()));
    }
  });

  let sel=document.getElementById(id);
  sel.innerHTML="<option value=''>All</option>";

  [...set].sort().forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// 🔥 IMPORTANT: level now included
fill("habitat","habitat");
fill("hotspot","hotspot");
fill("group","birdgroup");
fill("level","level");

// ================= START =================
function startGame(){

  wrong=[];

  let h=document.getElementById("habitat").value.toLowerCase();
  let s=document.getElementById("hotspot").value.toLowerCase();
  let g=document.getElementById("group").value.toLowerCase();
  let l=document.getElementById("level").value.toLowerCase();

  filtered = birds.filter(b=>
    (!h || (b.habitat||"").toLowerCase().includes(h)) &&
    (!s || (b.hotspot||"").toLowerCase().includes(s)) &&
    (!g || (b.birdgroup||"").toLowerCase().includes(g)) &&
    (!l || (b.level||"").toLowerCase().includes(l))
  );

  if(filtered.length===0){
    alert("No birds found!");
    return;
  }

  queue = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";
  nextBird();
}

// ================= SHUFFLE =================
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

// ================= NEXT =================
function nextBird(){

  if(queue.length===0){
    queue = shuffle([...filtered]);
  }

  current = queue.shift();

  playAudio(current.audio);

  let img=document.getElementById("spectrogram");
  if(current.spectrogram){
    img.src=current.spectrogram;
    img.style.display="block";
  } else img.style.display="none";

  let correct = (lang==="en") ? current.english : current.afrikaans;

  let options=[correct];

  let pool=[...filtered].filter(b=>b!==current);

  while(options.length<4 && pool.length){
    let r=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    options.push(lang==="en"?r.english:r.afrikaans);
  }

  shuffle(options);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.textContent=o;
    btn.onclick=()=>check(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
}

// ================= CHECK =================
function check(ans){

  let correct = (lang==="en") ? current.english : current.afrikaans;
  let ok = ans === correct;

  if(!ok) wrong.push(current);

  document.getElementById("info").innerHTML=`
    <b>${ok?"✔ Correct":"✖ Wrong"}</b><br><br>
    English: ${current.english}<br>
    Afrikaans: ${current.afrikaans}<br>
    Credit: ${current.credit}
  `;
}

// ================= REVIEW =================
function reviewMode(){
  if(wrong.length===0){
    alert("No mistakes!");
    return;
  }
  filtered=[...wrong];
  queue=shuffle([...filtered]);
  nextBird();
}

</script>

</body>
</html>
