<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound ID</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin:auto;
  padding:10px;
  font-size:14px;
}

h2 { margin-bottom:5px; }

.controls, .filters {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px;
  margin-bottom:8px;
}

button {
  padding:10px;
  font-size:14px;
}

select {
  padding:6px;
  font-size:14px;
}

#mainBtn {
  width:100%;
  background:#007bff;
  color:white;
  font-weight:bold;
}

#options {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px;
  margin-top:10px;
}

img {
  width:100%;
  margin-top:8px;
  border:1px solid #ccc;
}

/* SMALLER BIRD IMAGE */
#birdImage {
  width: 100%;
  height: 200px;        /* jy kan 180–250 speel hiermee */
  object-fit: contain;  /* belangrik: wys hele prent */
  background: #ffffff;  /* net vir netjiese spasie */
  margin-top: 8px;

}

#info {
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid #ddd;
  font-size:13px;
}

.bottomButtons {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px;
  margin-top:10px;
}

#reviewBtn {
  background:#ffc107;
}

.correct { color: green; font-weight:bold; }
.wrong { color: red; font-weight:bold; }

</style>
</head>

<body>

<h2>Bird Sound ID</h2>

<p style="font-size:13px; color:#666;">
Improve your bird sound identification skills using real recordings and spectrograms.
</p>

<!-- LANGUAGE -->
<select id="lang">
  <option value="en">English</option>
  <option value="af">Afrikaans</option>
</select>

<!-- CATEGORY -->
<select id="category" onchange="changeCategory()">
  <option value="cisticolas">Cisticolas</option>
  <option value="gardenwoodland">Garden and Woodland</option>  
  <option value="groundbirds">Groundbirds</option>  
  <option value="LBJs">LBJs</option>  
  <option value="other">Other</option>  
  <option value="raptors">Raptors</option>  
  <option value="seedeaters">Seedeaters</option>  
  <option value="waders">Waders</option>
  <option value="warblers">Warblers</option>  
  <option value="waterbirds">Waterbirds</option>


</select>

<!-- FILTERS -->
<div class="filters">

<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
  <option value="birdgroup">Group</option>
</select>

<select id="filterValue"></select>

<select id="levelFilter">
  <option value="">All Levels</option>
  <option value="1">Level 1</option>
  <option value="2">Level 2</option>
  <option value="3">Level 3</option>
</select>

<button id="mainBtn" onclick="startOrPlay()">Start / Play / Pause</button>

</div>

<hr>

<div id="gameArea" style="display:none;">

<img id="spectrogram">
<img id="birdImage" style="display:none;">

<div id="options"></div>

<div id="info"></div>

<div class="bottomButtons">
<button id="reviewBtn" onclick="reviewMode()">Review</button>
<button onclick="nextBird()">Next</button>
</div>

</div>

<script src="cisticolas.js"></script>
<script src="gardenwoodland.js"></script>  
<script src="groundbirds.js"></script>  
<script src="LBJs.js"></script>  
<script src="other.js"></script>  
<script src="raptors.js"></script>  
<script src="seedeaters.js"></script>  
<script src="waders.js"></script>
<script src="warblers.js"></script>  
<script src="waterbirds.js"></script>

<script src="interactive-spectrogram.js"></script>
<script src="app.js"></script>

</body>
</html>
