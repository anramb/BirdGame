<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Game Pro</title>

<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; padding: 10px 15px; }
#info { margin-top: 10px; }
#spectrogram { height: 200px; border: 1px solid #ccc; margin-top: 10px; }
</style>

<script src="https://unpkg.com/wavesurfer.js"></script>
<script src="https://unpkg.com/wavesurfer.js/dist/plugin/wavesurfer.spectrogram.min.js"></script>

</head>

<body>

<h1>Bird Sound Game PRO</h1>

<p>Score: <span id="score">0</span></p>

<select id="filterType" onchange="updateFilter()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Begin</button>

<hr>

<div id="gameArea" style="display:none;">

<div id="spectrogram"></div>

<button onclick="togglePlay()">Play / Pause</button>

<div id="options"></div>

<div id="info"></div>

<button onclick="nextBird()" id="nextBtn" style="display:none;">Next</button>

</div>

<script>

// ================= DATA =================
let birds = [
{english:"African Jacana", afrikaans:"Grootlangtoon", hotspot:"Kruger National Park; Marievale Bird Sanctuary; Nylsvley; Zaagkuildrift", habitat:"Wetland", audio:"XC651037_AfricanJacana.mp3", credit:"Tony Archer", licenseLink:"#", changes:"Original"},

{english:"Striped Crake", afrikaans:"Gestreepte Riethaan", hotspot:"Nylsvley; Zaagkuildrift", habitat:"Wetland", audio:"XC1079092_StripedCrake.mp3", credit:"Niall Perrins", licenseLink:"#", changes:"Original"},

{english:"Black Crake", afrikaans:"Swartriethaan", hotspot:"Kruger National Park; Marievale", habitat:"Wetland", audio:"XC475084_BlackCrake.mp3", credit:"Tony Archer", licenseLink:"#", changes:"Original"}
];

// ================= STATE =================
let filtered = [];
let queue = [];
let current = 0;
let score = 0;

// ================= WAVESURFER =================
let wavesurfer = WaveSurfer.create({
  container: '#spectrogram',
  waveColor: '#4f4f4f',
  progressColor: '#2b8a3e',
  height: 200,
  plugins: [
    WaveSurfer.spectrogram.create({
      container: '#spectrogram'
    })
  ]
});

// ================= SHUFFLE =================
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*i);
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// ================= AUDIO =================
function play(file){
  wavesurfer.load(file);
  wavesurfer.on('ready', () => {
    wavesurfer.play();
  });
}

function togglePlay(){
  wavesurfer.playPause();
}

// ================= FILTER =================
function updateFilter(){
  let type=document.getElementById("filterType").value;
  let sel=document.getElementById("filterValue");

  sel.innerHTML="";

  if(type==="none"){
    sel.innerHTML="<option value='all'>All</option>";
    return;
  }

  let values=[];
  birds.forEach(b=>{
    b[type].split(';').forEach(v=>{
      v=v.trim();
      if(!values.includes(v)) values.push(v);
    });
  });

  values.forEach(v=>{
    let opt=document.createElement("option");
    opt.value=v;
    opt.textContent=v;
    sel.appendChild(opt);
  });
}

// ================= GAME =================
function startGame(){
  let type=document.getElementById("filterType").value;
  let val=document.getElementById("filterValue").value;

  if(type==="none"){
    filtered=[...birds];
  } else {
    filtered=birds.filter(b=>b[type].includes(val));
  }

  queue = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";

  nextBird();
}

function nextBird(){

  if(queue.length===0){
    queue = shuffle([...filtered]);
  }

  let bird = queue.pop();
  current = bird;

  play(bird.audio);

  let options=[bird.english];

  while(options.length<4){
    let r=filtered[Math.floor(Math.random()*filtered.length)].english;
    if(!options.includes(r)) options.push(r);
  }

  shuffle(options);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.onclick=()=>check(o,bird);
    btn.textContent=o;
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

// ================= CHECK =================
function check(ans,bird){

  if(ans===bird.english){
    score++;
  }

  document.getElementById("score").textContent=score;

  document.getElementById("info").innerHTML=`
    <b>${ans===bird.english?"Correct ✔":"Wrong ✖"}</b><br>
    <b>${bird.english}</b> (${bird.afrikaans})<br>
    <small>${bird.credit}</small><br>
    <small>${bird.changes}</small>
  `;

  document.getElementById("nextBtn").style.display="inline-block";
}

</script>

</body>
</html>
