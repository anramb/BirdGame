<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 10px;
  max-width: 600px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
}

select {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 10px;
}

#info {
  margin-top: 15px;
  padding-top: 10px;
  border-top: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>Bird Sound Game</h2>

<label>Filter by:</label>
<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">None</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
  <option value="birdgroup">Bird Group</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Begin</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<div id="options"></div>

<div id="info"></div>

<button id="nextBtn" onclick="nextBird()" style="display:none;">Next</button>

</div>

<!-- 🔗 Data file -->
<script src="birds.js"></script>

<script>
// ================= STATE =================
let filtered = [];
let remaining = [];
let currentBird = null;

let audio = new Audio();

// ================= AUDIO =================
function playAudio(file){
  audio.pause();
  audio.src = file;
  audio.load();

  audio.play().catch(()=>{
    console.log("Audio blocked until user interaction");
  });
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

// ================= FILTER HELPERS =================
function getUnique(key){
  let arr = [];
  birds.forEach(b=>{
    b[key].split(";").forEach(v=>{
      v = v.trim();
      if(!arr.includes(v)) arr.push(v);
    });
  });
  return arr;
}

function updateFilterOptions(){
  let type = document.getElementById("filterType").value;
  let sel = document.getElementById("filterValue");

  sel.innerHTML = "";

  if(type === "none"){
    sel.innerHTML = "<option value=''>All</option>";
    return;
  }

  getUnique(type).forEach(v=>{
    let o = document.createElement("option");
    o.value = v;
    o.textContent = v;
    sel.appendChild(o);
  });
}

// ================= GAME LOGIC =================
function startGame(){
  let type = document.getElementById("filterType").value;
  let val = document.getElementById("filterValue").value;

  if(type === "none" || !val){
    filtered = [...birds];
  } else {
    filtered = birds.filter(b =>
      b[type].toLowerCase().includes(val.toLowerCase())
    );
  }

  if(filtered.length === 0){
    alert("No birds found for this filter");
    return;
  }

  remaining = [...filtered];
  document.getElementById("gameArea").style.display = "block";
  nextBird();
}

function nextBird(){
  if(remaining.length === 0){
    alert("You’ve heard all birds for this filter!");
    remaining = [...filtered];
  }

  let idx = Math.floor(Math.random() * remaining.length);
  currentBird = remaining.splice(idx,1)[0];

  playAudio(currentBird.audio);

  let options = [currentBird.english];

  while(options.length < 4){
    let r = filtered[Math.floor(Math.random()*filtered.length)].english;
    if(!options.includes(r)) options.push(r);
  }

  options.sort(()=>Math.random()-0.5);

  let div = document.getElementById("options");
  div.innerHTML = "";

  options.forEach(o=>{
    let btn = document.createElement("button");
    btn.textContent = o;
    btn.onclick = ()=>checkAnswer(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";
}

function checkAnswer(answer){
  let b = currentBird;

  document.getElementById("info").innerHTML = `
    <b>${answer === b.english ? "Correct ✔" : "Wrong ✖"}</b><br><br>
    <b>English:</b> ${b.english}<br>
    <b>Afrikaans:</b> ${b.afrikaans}<br>
    <b>Credit:</b> ${b.credit}<br>
    <b>Changes:</b> ${b.changes}<br>
    <b>License:</b> <a href="${b.licenseLink}" target="_blank">View</a>
  `;

  document.getElementById("nextBtn").style.display = "block";
}

// Init
updateFilterOptions();
</script>

</body>
</html>
