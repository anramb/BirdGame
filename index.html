<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  max-width: 650px;
  margin: auto;
  padding: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  font-size: 16px;
}

select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

img {
  width: 100%;
  margin-top: 10px;
  border: 1px solid #ccc;
}

#info {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<h2>Bird Sound Game</h2>

<label>Filter:</label>
<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
  <option value="birdgroup">Bird Group</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Start</button>

<button onclick="reviewMode()" style="background:#ffcc00;">Review Mistakes</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<img id="spectrogram">

<div id="options"></div>

<div id="info"></div>

<button id="nextBtn" onclick="nextBird()">Next</button>

</div>

<script src="birds.js"></script>

<script>

// ---------------- STATE ----------------
let filtered = [];
let remaining = [];
let currentBird = null;

let wrongAnswers = [];

let audio = new Audio();

// ---------------- AUDIO ----------------
function playAudio(file){
  audio.pause();
  audio.src = file;
  audio.load();
  audio.play().catch(()=>{});
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

// ---------------- FILTER ----------------
function getUnique(key){
  let arr=[];
  birds.forEach(b=>{
    b[key].split(";").forEach(v=>{
      v=v.trim();
      if(!arr.includes(v)) arr.push(v);
    });
  });
  return arr;
}

function updateFilterOptions(){
  let type=document.getElementById("filterType").value;
  let sel=document.getElementById("filterValue");

  sel.innerHTML="";

  if(type==="none"){
    sel.innerHTML="<option value=''>All</option>";
    return;
  }

  getUnique(type).forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// ---------------- GAME START ----------------
function startGame(){

  wrongAnswers = [];

  let type=document.getElementById("filterType").value;
  let val=document.getElementById("filterValue").value;

  if(type==="none" || !val){
    filtered=[...birds];
  } else {
    filtered=birds.filter(b =>
      b[type].toLowerCase().includes(val.toLowerCase())
    );
  }

  remaining = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";

  nextBird();
}

// ---------------- SHUFFLE ----------------
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// ---------------- NEXT BIRD (NO REPEATS) ----------------
function nextBird(){

  if(remaining.length === 0){
    remaining = shuffle([...filtered]);
  }

  currentBird = remaining.pop();

  playAudio(currentBird.audio);

  let img = document.getElementById("spectrogram");
  if(currentBird.spectrogram){
    img.src = currentBird.spectrogram;
    img.style.display="block";
  } else {
    img.style.display="none";
  }

  let options=[currentBird.english];

  while(options.length<4){
    let r = filtered[Math.floor(Math.random()*filtered.length)].english;
    if(!options.includes(r)) options.push(r);
  }

  shuffle(options);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.textContent=o;
    btn.onclick=()=>check(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
}

// ---------------- CHECK ANSWER ----------------
function check(ans){

  let correct = ans === currentBird.english;

  if(!correct){
    wrongAnswers.push(currentBird);
  }

  document.getElementById("info").innerHTML=`
    <b>${correct ? "Correct ✔" : "Wrong ✖"}</b><br><br>
    <b>English:</b> ${currentBird.english}<br>
    <b>Afrikaans:</b> ${currentBird.afrikaans}<br>
    <b>Credit:</b> ${currentBird.credit}<br>
    <b>Changes:</b> ${currentBird.changes}<br>
    <b>License:</b> <a href="${currentBird.licenseLink}" target="_blank">View</a>
  `;
}

// ---------------- REVIEW MODE ----------------
function reviewMode(){

  if(wrongAnswers.length === 0){
    alert("No mistakes to review!");
    return;
  }

  filtered = [...wrongAnswers];
  remaining = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";

  nextBird();
}

// init
updateFilterOptions();

</script>

</body>
</html>
