<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin:auto;
  padding:10px;
  font-size:14px;
}

h2 { margin-bottom:5px; }

.controls, .filters {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px;
  margin-bottom:8px;
}

button {
  padding:10px;
  font-size:14px;
}

select {
  padding:6px;
  font-size:14px;
}

#mainBtn {
  width:100%;
  background:#007bff;
  color:white;
  font-weight:bold;
}

#options {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px;
  margin-top:10px;
}

img {
  width:100%;
  margin-top:8px;
  border:1px solid #ccc;
}

#info {
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid #ddd;
  font-size:13px;
}

.bottomButtons {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px;
  margin-top:10px;
}

#reviewBtn {
  background:#ffc107;
}

</style>
</head>

<body>

<h2>Bird Sound Game</h2>

<!-- FILTERS -->
<div class="filters">
<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
  <option value="birdgroup">Group</option>
</select>

<select id="filterValue"></select>

<select id="levelFilter">
  <option value="">All Levels</option>
  <option value="1">Level 1</option>
  <option value="2">Level 2</option>
  <option value="3">Level 3</option>
</select>

<button id="mainBtn" onclick="startOrPlay()">Start / Play</button>
</div>

<hr>

<div id="gameArea" style="display:none;">

<img id="spectrogram">

<div id="options"></div>

<div id="info"></div>

<div class="bottomButtons">
<button onclick="nextBird()">Next</button>
<button id="reviewBtn" onclick="reviewMode()">Review</button>
</div>

</div>

<script src="birds.js"></script>

<script>

let filtered = [];
let queue = [];
let currentBird = null;
let wrongAnswers = [];

let audio = new Audio();
let started = false;

// -------- AUDIO --------
function playAudio(file){
  audio.pause();
  audio.src = file;
  audio.load();
  audio.play().catch(()=>{});
}

function startOrPlay(){
  if(!started){
    startGame();
    started = true;
  } else {
    audio.paused ? audio.play() : audio.pause();
  }
}

// -------- FILTER --------
function getUnique(key){
  let arr=[];
  birds.forEach(b=>{
    (b[key] || "").split(";").forEach(v=>{
      v=v.trim();
      if(v && !arr.includes(v)) arr.push(v);
    });
  });
  return arr;
}

function updateFilterOptions(){
  let type=document.getElementById("filterType").value;
  let sel=document.getElementById("filterValue");

  sel.innerHTML="";

  if(type==="none"){
    sel.innerHTML="<option value=''>All</option>";
    return;
  }

  getUnique(type).forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// -------- SHUFFLE --------
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// -------- START --------
function startGame(){

  wrongAnswers = [];

  let type=document.getElementById("filterType").value;
  let val=document.getElementById("filterValue").value;
  let lvl=document.getElementById("levelFilter").value;

  filtered = birds.filter(b=>{
    let match1 = (type==="none" || !val || (b[type] || "").toLowerCase().includes(val.toLowerCase()));
    let match2 = (!lvl || (b.level || "").startsWith(lvl));
    return match1 && match2;
  });

  queue = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";

  nextBird();
}

// -------- NEXT (NO REPEAT) --------
function nextBird(){

  if(queue.length === 0){
    queue = shuffle([...filtered]);
  }

  currentBird = queue.shift();

  playAudio(currentBird.audio);

  let img=document.getElementById("spectrogram");
  if(currentBird.spectrogram){
    img.src=currentBird.spectrogram;
    img.style.display="block";
  } else {
    img.style.display="none";
  }

  let options=[currentBird.english];

  let pool = filtered.filter(b => b.english !== currentBird.english);

  while(options.length<4 && pool.length>0){
    let r = pool[Math.floor(Math.random()*pool.length)].english;
    if(!options.includes(r)) options.push(r);
  }

  shuffle(options);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.textContent=o;
    btn.onclick=()=>check(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
}

// -------- CHECK --------
function check(ans){

  let correct = ans === currentBird.english;

  if(!correct){
    wrongAnswers.push(currentBird);
  }

  document.getElementById("info").innerHTML=`
    <b>${correct ? "✔ Correct" : "✖ Wrong"}</b><br>
    ${currentBird.english} / ${currentBird.afrikaans}<br>
    <small>${currentBird.credit}</small>
  `;
}

// -------- REVIEW --------
function reviewMode(){

  if(wrongAnswers.length === 0){
    alert("No mistakes yet");
    return;
  }

  filtered = [...wrongAnswers];
  queue = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";

  nextBird();
}

updateFilterOptions();

</script>

</body>
</html>
