<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 10px;
  max-width: 600px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
}

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

#info {
  margin-top: 15px;
  padding-top: 10px;
  border-top: 1px solid #ccc;
}

img {
  width: 100%;
  margin-top: 10px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<h2>Bird Sound Game</h2>

<label>Filter:</label>
<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">None</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
  <option value="birdgroup">Bird Group</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Begin</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<img id="spectrogram" style="display:none;">

<div id="options"></div>

<div id="info"></div>

<button id="nextBtn" onclick="nextBird()" style="display:none;">Next</button>

</div>

<script src="birds.js"></script>

<script>

let filtered = [];
let currentBird = null;

let audio = new Audio();

// AUDIO
function playAudio(file){
  audio.pause();
  audio.src = file;
  audio.load();
  audio.play().catch(()=>{});
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

// FILTER
function getUnique(key){
  let arr=[];
  birds.forEach(b=>{
    b[key].split(";").forEach(v=>{
      v=v.trim();
      if(!arr.includes(v)) arr.push(v);
    });
  });
  return arr;
}

function updateFilterOptions(){
  let type=document.getElementById("filterType").value;
  let sel=document.getElementById("filterValue");

  sel.innerHTML="";

  if(type==="none"){
    sel.innerHTML="<option value=''>All</option>";
    return;
  }

  getUnique(type).forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// GAME
function startGame(){
  let type=document.getElementById("filterType").value;
  let val=document.getElementById("filterValue").value;

  if(type==="none" || !val){
    filtered=[...birds];
  } else {
    filtered=birds.filter(b=>
      b[type].toLowerCase().includes(val.toLowerCase())
    );
  }

  document.getElementById("gameArea").style.display="block";
  nextBird();
}

function nextBird(){

  currentBird = filtered[Math.floor(Math.random()*filtered.length)];

  playAudio(currentBird.audio);

  // spectrogram
  let img = document.getElementById("spectrogram");
  if(currentBird.spectrogram){
    img.src = currentBird.spectrogram;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  // options
  let options=[currentBird.english];

  while(options.length<4){
    let r = filtered[Math.floor(Math.random()*filtered.length)].english;
    if(!options.includes(r)) options.push(r);
  }

  options.sort(()=>Math.random()-0.5);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.textContent=o;
    btn.onclick=()=>check(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

function check(ans){
  let b=currentBird;

  document.getElementById("info").innerHTML=`
    <b>${ans===b.english?"Correct ✔":"Wrong ✖"}</b><br><br>
    <b>English:</b> ${b.english}<br>
    <b>Afrikaans:</b> ${b.afrikaans}<br>
    <b>Credit:</b> ${b.credit}<br>
    <b>Changes:</b> ${b.changes}<br>
    <b>License:</b> <a href="${b.licenseLink}" target="_blank">View</a>
  `;

  document.getElementById("nextBtn").style.display="block";
}

updateFilterOptions();

</script>

</body>
</html>
