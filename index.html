<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Call Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; max-width:700px; margin:auto; padding:10px; }
button, select { width:100%; padding:12px; margin:6px 0; font-size:16px; }
img { width:100%; margin-top:10px; border:1px solid #ccc; }
#info { margin-top:10px; border-top:1px solid #ddd; padding-top:10px; }
.lang-btn { background:#eee; }
</style>
</head>

<body>

<h2 id="title">Bird Call Game</h2>

<button class="lang-btn" onclick="toggleLanguage()">Switch Language</button>

<label id="lblHabitat">Habitat:</label>
<select id="habitatSelect"></select>

<label id="lblHotspot">Hotspot:</label>
<select id="hotspotSelect"></select>

<label id="lblGroup">Bird Group:</label>
<select id="groupSelect"></select>

<label id="lblLevel">Abundance Level:</label>
<select id="levelSelect"></select>

<button onclick="startGame()" id="startBtn">Start</button>
<button onclick="reviewMode()" style="background:#ffcc00;" id="reviewBtn">Review Mistakes</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()" id="playBtn">Play / Pause</button>

<img id="spectrogram" style="display:none">

<div id="options"></div>
<div id="info"></div>

<button onclick="nextBird()" id="nextBtn">Next</button>

</div>

<script src="birds.js"></script>

<script>
// ================= LANGUAGE =================
let language = "en"; // default

function toggleLanguage(){
  language = language === "en" ? "af" : "en";
  updateLanguage();
}

function updateLanguage(){
  document.getElementById("title").textContent = language==="en" ? "Bird Call Game" : "Voëlroep Speletjie";
  document.getElementById("startBtn").textContent = language==="en" ? "Start" : "Begin";
  document.getElementById("reviewBtn").textContent = language==="en" ? "Review Mistakes" : "Hersien Foute";
  document.getElementById("playBtn").textContent = language==="en" ? "Play / Pause" : "Speel / Stop";
  document.getElementById("nextBtn").textContent = language==="en" ? "Next" : "Volgende";
  document.getElementById("lblHabitat").textContent = language==="en" ? "Habitat:" : "Habitat:";
  document.getElementById("lblHotspot").textContent = language==="en" ? "Hotspot:" : "Ligging:";
  document.getElementById("lblGroup").textContent = language==="en" ? "Bird Group:" : "Voëlgroep:";
  document.getElementById("lblLevel").textContent = language==="en" ? "Abundance Level:" : "Voorkoms Vlak:";
}

// ================= GAME STATE =================
let filtered=[], queue=[], current=null, wrongAnswers=[];
let audio = new Audio();

// ================= AUDIO =================
function playAudio(file){
  audio.pause();
  audio.src = file;
  audio.load();
  audio.play().catch(()=>{});
}

function togglePlay(){
  audio.paused ? audio.play() : audio.pause();
}

// ================= FILTER DROPDOWNS =================
function fillDropdown(id,key){
  let set = new Set();
  birds.forEach(b=>{
    if(b[key]){
      b[key].split(";").forEach(v=>set.add(v.trim()));
    }
  });

  let sel=document.getElementById(id);
  sel.innerHTML="<option value=''>All</option>";
  [...set].forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

fillDropdown("habitatSelect","habitat");
fillDropdown("hotspotSelect","hotspot");
fillDropdown("groupSelect","birdgroup");
fillDropdown("levelSelect","abundance");

// ================= SHUFFLE =================
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// ================= START GAME =================
function startGame(){
  wrongAnswers=[];

  let h=document.getElementById("habitatSelect").value.toLowerCase();
  let s=document.getElementById("hotspotSelect").value.toLowerCase();
  let g=document.getElementById("groupSelect").value.toLowerCase();
  let l=document.getElementById("levelSelect").value.toLowerCase();

  filtered = birds.filter(b=>
    (!h || (b.habitat||"").toLowerCase().includes(h)) &&
    (!s || (b.hotspot||"").toLowerCase().includes(s)) &&
    (!g || (b.birdgroup||"").toLowerCase().includes(g)) &&
    (!l || (b.abundance||"").toLowerCase().includes(l))
  );

  queue = shuffle([...filtered]);

  document.getElementById("gameArea").style.display="block";
  nextBird();
}

// ================= NEXT (NO REPEAT) =================
function nextBird(){
  if(queue.length===0) queue=shuffle([...filtered]);
  current = queue.shift();

  playAudio(current.audio);

  let img=document.getElementById("spectrogram");
  if(current.spectrogram){
    img.src=current.spectrogram;
    img.style.display="block";
  } else img.style.display="none";

  let correctName = language==="en" ? current.english : current.afrikaans;

  let options=[correctName];
  let pool=[...filtered].filter(b=>b!==current);

  while(options.length<4 && pool.length>0){
    let r=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    options.push(language==="en"?r.english:r.afrikaans);
  }

  shuffle(options);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.textContent=o;
    btn.onclick=()=>check(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
}

// ================= CHECK ANSWER =================
function check(ans){
  let correctName = language==="en" ? current.english : current.afrikaans;
  let correct = ans === correctName;

  if(!correct) wrongAnswers.push(current);

  document.getElementById("info").innerHTML=`
    <b>${correct ? "✔" : "✖"} ${correctName}</b><br>
    English: ${current.english}<br>
    Afrikaans: ${current.afrikaans}<br>
    Credit: ${current.credit}<br>
    License: <a href="${current.licenseLink}" target="_blank">View</a>
  `;
}

// ================= REVIEW =================
function reviewMode(){
  if(wrongAnswers.length===0){
    alert(language==="en"?"No mistakes!":"Geen foute nie!");
    return;
  }
  filtered=[...wrongAnswers];
  queue=shuffle([...filtered]);
  nextBird();
}

updateLanguage();
</script>
</body>
</html>
