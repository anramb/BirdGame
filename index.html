<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: auto;
  padding: 10px;
  font-size: 14px;
}

h2 { margin-bottom: 5px; }

.topBar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}

.filters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}

button, select {
  padding: 10px;
  font-size: 14px;
}

#mainBtn {
  width: 100%;
  background: #007bff;
  color: white;
  font-weight: bold;
}

#options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
}

img {
  width: 100%;
  margin-top: 8px;
  border: 1px solid #ccc;
}

#info {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #ddd;
}

.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }

.bottomButtons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
}

#reviewBtn {
  background: #ffc107;
}
</style>
</head>

<body>

<h2>Bird Sound Game</h2>

<p>Improve your bird sound identification skills.</p>

<!-- TOP BAR -->
<div class="topBar">

<select id="lang" onchange="setLanguage()">
  <option value="en">English</option>
  <option value="af">Afrikaans</option>
</select>

<select id="category" onchange="loadCategory()">
  <option value="waders">Waders</option>
  <option value="waterbirds">Waterbirds</option>
  <option value="cisticolas">Cisticolas</option>
  <option value="warblers">Warblers</option>
</select>

</div>

<!-- FILTERS -->
<div class="filters">

<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
  <option value="birdgroup">Group</option>
</select>

<select id="filterValue"></select>

<select id="levelFilter">
  <option value="">All Levels</option>
  <option value="1">Level 1</option>
  <option value="2">Level 2</option>
  <option value="3">Level 3</option>
</select>

</div>

<button id="mainBtn" onclick="startOrPlay()">Start / Play / Pause</button>

<hr>

<div id="gameArea" style="display:none;">

<img id="spectrogram">

<div id="options"></div>

<div id="info"></div>

<div class="bottomButtons">
<button onclick="nextBird()">Next</button>
<button id="reviewBtn" onclick="reviewMode()">Review</button>
</div>

</div>

<script src="waders.js"></script>
<script src="waterbirds.js"></script>
<script src="cisticolas.js"></script>
<script src="warblers.js"></script>

<script src="app.js"></script>

</body>
</html>
