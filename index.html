<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound Game</title>

<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; padding: 10px 15px; font-size: 16px; }
select { margin: 5px; padding: 5px; }
#info { margin-top: 15px; padding: 10px; border-top: 1px solid #ccc; }
</style>

</head>

<body>

<h1>Bird Sound Game</h1>

<label>Filter:</label>
<select id="filterType" onchange="updateFilterOptions()">
  <option value="none">None</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Begin</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<div id="options"></div>

<div id="info"></div>

<button id="nextBtn" onclick="nextBird()" style="display:none;">Next</button>

</div>

<script>

// ================= DATABASE =================
let birds = [
{english:"African Jacana", afrikaans:"Grootlangtoon", hotspot:"Kruger National Park; Marievale Bird Sanctuary; Nylsvley; Zaagkuildrift", habitat:"Wetland", audio:"XC651037_AfricanJacana.mp3", credit:"Tony Archer", licenseLink:"https://creativecommons.org/licenses/by-nc-sa/4.0/", changes:"Original recording"},

{english:"Striped Crake", afrikaans:"Gestreepte Riethaan", hotspot:"Nylsvley; Zaagkuildrift", habitat:"Wetland", audio:"XC1079092_StripedCrake.mp3", credit:"Niall Perrins", licenseLink:"https://creativecommons.org/licenses/by-nc-sa/4.0/", changes:"Original recording"},

{english:"Black Crake", afrikaans:"Swartriethaan", hotspot:"Kruger National Park; Marievale Bird Sanctuary; Nylsvley; Zaagkuildrift", habitat:"Wetland", audio:"XC475084_BlackCrake.mp3", credit:"Tony Archer", licenseLink:"https://creativecommons.org/licenses/by-nc-sa/4.0/", changes:"Original recording"},

{english:"Common Greenshank", afrikaans:"Groenpootruiter", hotspot:"Marievale Bird Sanctuary", habitat:"Wetland", audio:"XC670128_CommonGreenshank.mp3", credit:"Tim Cockroft", licenseLink:"https://creativecommons.org/licenses/by-nc-sa/4.0/", changes:"Original recording"}
];

// ================= STATE =================
let filtered = [];
let current = 0;

let audio = new Audio();

// ================= AUDIO =================
function playAudio(file){
  audio.pause();
  audio.src = file;
  audio.load();

  let playPromise = audio.play();
  if(playPromise !== undefined){
    playPromise.catch(err => {
      console.log("Audio blocked:", err);
    });
  }
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

// ================= FILTER =================
function getUnique(key){
  let arr=[];
  birds.forEach(b=>{
    b[key].split(';').forEach(v=>{
      v=v.trim();
      if(!arr.includes(v)) arr.push(v);
    });
  });
  return arr;
}

function updateFilterOptions(){
  let type=document.getElementById("filterType").value;
  let sel=document.getElementById("filterValue");

  sel.innerHTML="";

  if(type==="none"){
    sel.innerHTML="<option value=''>All</option>";
    return;
  }

  getUnique(type).forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// ================= GAME =================
function startGame(){
  let type=document.getElementById("filterType").value;
  let val=document.getElementById("filterValue").value;

  if(type==="none" || !val){
    filtered=[...birds];
  } else {
    filtered=birds.filter(b=>
      b[type].toLowerCase().includes(val.toLowerCase())
    );
  }

  document.getElementById("gameArea").style.display="block";
  nextBird();
}

function nextBird(){
  current=Math.floor(Math.random()*filtered.length);
  let bird=filtered[current];

  playAudio(bird.audio);

  let options=[bird.english];

  while(options.length<4){
    let r=filtered[Math.floor(Math.random()*filtered.length)].english;
    if(!options.includes(r)) options.push(r);
  }

  options.sort(()=>Math.random()-0.5);

  let div=document.getElementById("options");
  div.innerHTML="";

  options.forEach(o=>{
    let btn=document.createElement("button");
    btn.innerText=o;
    btn.onclick=()=>check(o);
    div.appendChild(btn);
  });

  document.getElementById("info").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

// ================= CHECK =================
function check(ans){
  let b=filtered[current];

  document.getElementById("info").innerHTML=`
    <b>${ans===b.english?"Correct ✔":"Wrong ✖"}</b><br><br>
    <b>English:</b> ${b.english}<br>
    <b>Afrikaans:</b> ${b.afrikaans}<br>
    <b>Credit:</b> ${b.credit}<br>
    <b>Changes:</b> ${b.changes}<br>
    <b>License:</b> <a href="${b.licenseLink}" target="_blank">View</a>
  `;

  document.getElementById("nextBtn").style.display="inline-block";
}

updateFilterOptions();

</script>

</body>
</html>
