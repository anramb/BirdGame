<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>South African Bird ID Game</title>

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

h2 { text-align:center; }

button, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

#controls {
  display: grid;
  gap: 8px;
}

.row {
  display: flex;
  gap: 5px;
}

.row button {
  flex: 1;
}

img {
  width: 100%;
  margin-top: 10px;
  border: 1px solid #ccc;
}

.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }

.small { font-size: 13px; color: #666; }

</style>
</head>

<body>

<h2>South African Bird ID Game</h2>

<p class="small">
Improve your bird sound identification skills using real recordings and spectrograms.
</p>

<!-- LANGUAGE -->
<select id="lang">
  <option value="en">English</option>
  <option value="af">Afrikaans</option>
</select>

<!-- FILTERS -->
<select id="category" onchange="loadCategory()">
  <option value="waders">Waders</option>
  <option value="cisticolas">Cisticolas</option>
  <option value="waterbirds">Waterbirds</option>
  <option value="warblers">Warblers</option>
</select>

<select id="level">
  <option value="all">All Levels</option>
  <option value="1 Beginner">Level 1</option>
  <option value="2 Intermediate">Level 2</option>
  <option value="3 Advanced">Level 3</option>
</select>

<div id="controls">
  <button onclick="startGame()">Start Game</button>
  <button onclick="reviewMode()">Review Mistakes</button>
</div>

<hr>

<div id="game" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<img id="spectrogram">

<div id="options"></div>

<div id="result"></div>

<button onclick="nextBird()">Next</button>

</div>

<script src="waders.js"></script>
<script src="cisticolas.js"></script>
<script src="waterbirds.js"></script>
<script src="warblers.js"></script>

<script src="app.js"></script>

</body>
</html>
