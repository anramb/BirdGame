<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound Game SAFE</title>

<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; padding: 10px 15px; }
select { margin: 5px; padding: 5px; }
#info { margin-top: 10px; padding: 10px; border-top: 1px solid #ccc; }
</style>

</head>

<body>

<h1>Bird Sound Game</h1>

<p>Score: <span id="score">0</span></p>

<label>Filter:</label>

<select id="filterType" onchange="updateFilters()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Begin</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="playCurrent()">Play Sound</button>

<div id="options"></div>

<div id="info"></div>

<button onclick="nextBird()" id="nextBtn" style="display:none;">Next</button>

</div>

<script>

// ================= DATA =================
let birds = [
{english:"African Jacana", afrikaans:"Grootlangtoon", hotspot:"Kruger National Park; Marievale Bird Sanctuary; Nylsvley", habitat:"Wetland", audio:"XC651037_AfricanJacana.mp3", credit:"Tony Archer", changes:"Original"},
{english:"Striped Crake", afrikaans:"Gestreepte Riethaan", hotspot:"Nylsvley; Zaagkuildrift", habitat:"Wetland", audio:"XC1079092_StripedCrake.mp3", credit:"Niall Perrins", changes:"Original"},
{english:"Black Crake", afrikaans:"Swartriethaan", hotspot:"Kruger NP", habitat:"Wetland", audio:"XC475084_BlackCrake.mp3", credit:"Tony Archer", changes:"Original"}
];

// ================= STATE =================
let filtered = [];
let queue = [];
let current = null;
let score = 0;
let audio = new Audio();

// ================= PLAY =================
function playCurrent(){

  if(!current){
    alert("No bird loaded yet!");
    return;
  }

  audio.pause();
  audio = new Audio(current.audio);

  audio.play().catch(err=>{
    alert("Audio blocked or missing file: " + current.audio);
    console.log(err);
  });
}

// ================= FILTER =================
function updateFilters(){

  let type = document.getElementById("filterType").value;
  let sel = document.getElementById("filterValue");

  sel.innerHTML = "";

  if(type === "none"){
    sel.innerHTML = "<option value='all'>All</option>";
    return;
  }

  let values = [];

  birds.forEach(b=>{
    if(!b[type]) return;

    b[type].split(';').forEach(v=>{
      v = v.trim();
      if(!values.includes(v)) values.push(v);
    });
  });

  if(values.length === 0){
    sel.innerHTML = "<option>No options</option>";
    return;
  }

  values.forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// ================= START =================
function startGame(){

  let type = document.getElementById("filterType").value;
  let val = document.getElementById("filterValue").value;

  if(type === "none" || val === "all" || !val){
    filtered = [...birds];
  } else {
    filtered = birds.filter(b =>
      (b[type] || "").toLowerCase().includes(val.toLowerCase())
    );
  }

  if(filtered.length === 0){
    alert("No birds found for this filter!");
    return;
  }

  queue = [...filtered];
  shuffle(queue);

  document.getElementById("gameArea").style.display = "block";

  nextBird();
}

// ================= NEXT =================
function nextBird(){

  if(queue.length === 0){
    queue = [...filtered];
    shuffle(queue);
  }

  current = queue.pop();

  let opts = [current.english];

  while(opts.length < 4){
    let r = filtered[Math.floor(Math.random()*filtered.length)];
    if(!opts.includes(r.english)) opts.push(r.english);
  }

  shuffle(opts);

  let div = document.getElementById("options");
  div.innerHTML = "";

  opts.forEach(o=>{
    let b = document.createElement("button");
    b.textContent = o;
    b.onclick = ()=>check(o);
    div.appendChild(b);
  });

  document.getElementById("info").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";
}

// ================= CHECK =================
function check(ans){

  if(ans === current.english) score++;

  document.getElementById("score").textContent = score;

  document.getElementById("info").innerHTML =
    (ans === current.english ? "✔ Correct" : "✖ Wrong") +
    "<br><br><b>Answer:</b> " + current.english +
    "<br><b>Afrikaans:</b> " + current.afrikaans +
    "<br><b>Credit:</b> " + current.credit +
    "<br><b>Changes:</b> " + current.changes;

  document.getElementById("nextBtn").style.display = "inline-block";
}

// ================= SHUFFLE =================
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

updateFilters();

</script>

</body>
</html>
