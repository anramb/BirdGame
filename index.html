<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Game Stable</title>

<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; padding: 10px 15px; }
#info { margin-top: 10px; }
#spectrogram {
  margin-top: 10px;
  width: 100%;
  height: 150px;
  background: black;
}
</style>

<script src="https://unpkg.com/wavesurfer.js"></script>

</head>

<body>

<h1>Bird Sound Game</h1>

<p>Score: <span id="score">0</span></p>

<select id="filterType" onchange="updateFilters()">
  <option value="none">All</option>
  <option value="habitat">Habitat</option>
  <option value="hotspot">Hotspot</option>
</select>

<select id="filterValue"></select>

<button onclick="startGame()">Begin</button>

<hr>

<div id="gameArea" style="display:none;">

<button onclick="togglePlay()">Play / Pause</button>

<canvas id="spectrogram"></canvas>

<div id="options"></div>

<div id="info"></div>

<button onclick="nextBird()" id="nextBtn" style="display:none;">Next</button>

</div>

<script>

// ================= DATA =================
let birds = [
{english:"African Jacana", afrikaans:"Grootlangtoon", hotspot:"Kruger National Park; Nylsvley", habitat:"Wetland", audio:"XC651037_AfricanJacana.mp3", credit:"Tony Archer", changes:"Original"},
{english:"Black Crake", afrikaans:"Swartriethaan", hotspot:"Kruger NP", habitat:"Wetland", audio:"XC475084_BlackCrake.mp3", credit:"Tony Archer", changes:"Original"}
];

// ================= STATE =================
let filtered=[];
let queue=[];
let current=null;
let score=0;

let audio=new Audio();

// ================= AUDIO (SAFE) =================
function play(file){

  audio.pause();
  audio = new Audio(file);

  audio.play().catch(err=>{
    console.log("Autoplay blocked:", err);
  });

  drawFakeSpectrogram(); // visual fallback
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

// ================= FAKE SPECTROGRAM (SAFE) =================
function drawFakeSpectrogram(){

  let canvas=document.getElementById("spectrogram");
  let ctx=canvas.getContext("2d");

  canvas.width=canvas.offsetWidth;
  canvas.height=150;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let bars=60;

  for(let i=0;i<bars;i++){
    let h=Math.random()*120;

    ctx.fillStyle=`rgb(0,200,100)`;
    ctx.fillRect(i*(canvas.width/bars), 150-h, 5, h);
  }
}

// ================= FILTER =================
function updateFilters(){
  let type=document.getElementById("filterType").value;
  let sel=document.getElementById("filterValue");

  sel.innerHTML="";

  if(type==="none"){
    sel.innerHTML="<option value='all'>All</option>";
    return;
  }

  let values=[];
  birds.forEach(b=>{
    b[type].split(';').forEach(v=>{
      v=v.trim();
      if(!values.includes(v)) values.push(v);
    });
  });

  values.forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    sel.appendChild(o);
  });
}

// ================= GAME =================
function startGame(){
  let type=document.getElementById("filterType").value;
  let val=document.getElementById("filterValue").value;

  if(type==="none"){
    filtered=[...birds];
  } else {
    filtered=birds.filter(b=>b[type].includes(val));
  }

  queue=[...filtered];
  shuffle(queue);

  document.getElementById("gameArea").style.display="block";

  nextBird();
}

// ================= SHUFFLE =================
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*i);
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// ================= NEXT =================
function nextBird(){

  if(queue.length===0){
    queue=[...filtered];
    shuffle(queue);
  }

  current=queue.pop();

  play(current.audio);

  let opts=[current.english];

  while(opts.length<4){
    let r=filtered[Math.floor(Math.random()*filtered.length)].english;
    if(!opts.includes(r)) opts.push(r);
  }

  shuffle(opts);

  let div=document.getElementById("options");
  div.innerHTML="";

  opts.forEach(o=>{
    let b=document.createElement("button");
    b.textContent=o;
    b.onclick=()=>check(o);
    div.appendChild(b);
  });

  document.getElementById("info").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

// ================= CHECK =================
function check(ans){

  if(ans===current.english) score++;

  document.getElementById("score").textContent=score;

  document.getElementById("info").innerHTML=
    (ans===current.english?"✔ Correct":"✖ Wrong") +
    "<br>" + current.english + " - " + current.afrikaans;

  document.getElementById("nextBtn").style.display="inline-block";
}

</script>

</body>
</html>
