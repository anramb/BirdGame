<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bird Sound Game</title>

<style>
body { font-family: Arial; max-width: 700px; margin:auto; padding:10px; }
button { width:100%; padding:12px; margin:5px 0; }
select { width:100%; padding:8px; margin:5px 0; }
img { width:100%; margin-top:10px; border:1px solid #ccc; }
.correct { color:green; font-weight:bold; }
.wrong { color:red; font-weight:bold; }
.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<h2>Bird Sound Game</h2>

<select id="category">
  <option value="">All Categories</option>
  <option value="waders">Waders</option>
  <option value="waterbirds">Waterbirds</option>
  <option value="cisticolas">Cisticolas</option>
  <option value="warblers">Warblers</option>
</select>

<button onclick="startGame()">Start</button>
<button onclick="togglePlay()">Play / Pause</button>

<hr>

<div id="gameArea" style="display:none;">

<img id="spectrogram">

<div id="options"></div>

<div id="info"></div>

<button onclick="nextBird()">Next</button>

</div>

<script src="data/birds_waders.js"></script>
<script src="data/birds_waterbirds.js"></script>
<script src="data/birds_cisticolas.js"></script>
<script src="data/birds_warblers.js"></script>

<script src="app.js"></script>

</body>
</html>
