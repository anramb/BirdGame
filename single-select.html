<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Bird Select</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            margin: 0;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        select {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 0.8em;
        }
        
        /* Bird name & species dropdown - adjust font-size here if names are too big/small */
        #birdSelector, #speciesFilter {
            font-size: 0.75em;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .bird-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .bird-name {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .bird-name-afr {
            font-size: 1.5em;
            color: #666;
            font-style: italic;
            margin-bottom: 15px;
        }
        
        .bird-credit {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        
        .bird-credit a {
            color: #667eea;
            text-decoration: none;
        }
        
        .bird-credit a:hover {
            text-decoration: underline;
        }
        
        .spectrogram-outer {
            margin: 15px 0;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 8px;
        }
        
        .spectrogram-scroll {
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            height: 220px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .spectrogram-scroll canvas {
            display: block;
            height: 200px;
        }
        
        .spectrogram-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background-color: red;
            pointer-events: none;
            z-index: 10;
            display: none;
            box-shadow: 0 0 4px rgba(255,0,0,0.6);
        }
        
        .spectrogram-time-axis {
            height: 18px;
            position: relative;
            color: #aaa;
            font-size: 10px;
            font-family: monospace;
        }
        
        .spectrogram-loading {
            color: #aaa;
            text-align: center;
            padding: 80px 0;
            font-size: 0.95em;
        }
        
        audio {
            width: 100%;
            margin-top: 20px;
        }
        
        .bird-photo-container {
            text-align: center;
            margin-top: 15px;
        }
        
        .bird-photo-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .bird-photo-credit {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }
        
        .language-selector {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1em;
            background: white;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            select {
                width: 100%;
            }
            
            /* Bird name font size on mobile - adjust px value here */
            #birdSelector, #speciesFilter {
                font-size: 13px;
            }
            
            .bird-name {
                font-size: 1.5em;
            }
            
            .bird-name-afr {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Single Bird Select</h1>
            <button onclick="window.location.href='start.html'" class="btn">← Back</button>
        </div>
        
        <div class="controls">
            <select id="languageSelector" class="language-selector" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="af">Afrikaans</option>
            </select>
            <select id="speciesFilter" onchange="filterBySpecies()">
                <option value="">All Species</option>
            </select>
            <select id="birdSelector">
                <option value="">Select a bird...</option>
            </select>
        </div>
        
        <div id="birdDisplay" style="display: none;">
            <div class="bird-info">
                <div class="bird-name" id="birdName"></div>
                <div class="bird-name-afr" id="birdNameAfr"></div>
                <div class="bird-credit" id="birdCredit"></div>
            </div>
            
            <div class="spectrogram-outer" id="spectrogramOuter" style="display: none;">
                <div class="spectrogram-scroll" id="spectrogramScroll">
                    <canvas id="spectrogramCanvas"></canvas>
                    <div class="spectrogram-line" id="spectrogramLine"></div>
                </div>
                <div class="spectrogram-time-axis" id="timeAxis"></div>
            </div>
            
            <audio id="audioPlayer" controls></audio>
            
            <div style="margin-top: 15px; text-align: center;">
                <button id="nextBirdBtn" onclick="nextBird()" class="btn">Next Bird ▶</button>
            </div>
            
            <div class="bird-photo-container" id="birdPhotoContainer" style="display: none;">
                <img id="birdPhoto" alt="Bird photo">
                <div class="bird-photo-credit" id="birdPhotoCredit"></div>
            </div>
        </div>
    </div>
    
    <div style="position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 8px; background: rgba(255,255,255,0.9); color: #666; font-size: 0.7em; z-index: 1000;">Created by Marna Buys with Windsurf</div>
    
    <script src="allbirds.js"></script>
    <script src="spectrogram-generator.js"></script>
    
    <script>
        let currentBird = null;
        let currentLanguage = 'en';
        let currentSpeciesFilter = '';
        let filteredBirds = [];
        let audio = document.getElementById('audioPlayer');
        
        // Get species (first word) from English name
        function getSpecies(englishName) {
            return englishName.split(' ')[0];
        }
        
        // Populate species filter dropdown
        function populateSpeciesFilter() {
            const filter = document.getElementById('speciesFilter');
            if (typeof allbirds === 'undefined' || !Array.isArray(allbirds)) return;
            
            const species = [...new Set(allbirds.map(b => getSpecies(b.english)))].sort();
            const allLabel = currentLanguage === 'af' ? 'Alle Spesies' : 'All Species';
            filter.innerHTML = `<option value="">${allLabel}</option>`;
            species.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                filter.appendChild(opt);
            });
            // Restore previous selection if still valid
            if (currentSpeciesFilter && species.includes(currentSpeciesFilter)) {
                filter.value = currentSpeciesFilter;
            }
        }
        
        // Filter by species
        function filterBySpecies() {
            currentSpeciesFilter = document.getElementById('speciesFilter').value;
            populateBirdSelector();
            // Hide bird display when filter changes
            document.getElementById('birdDisplay').style.display = 'none';
        }
        
        // Change language
        function changeLanguage() {
            currentLanguage = document.getElementById('languageSelector').value;
            populateSpeciesFilter();
            populateBirdSelector();
            if (currentBird) {
                displayBird();
            }
        }
        
        // Populate bird selector
        function populateBirdSelector() {
            const selector = document.getElementById('birdSelector');
            
            if (typeof allbirds === 'undefined' || !Array.isArray(allbirds)) {
                selector.innerHTML = '<option value="">No birds available</option>';
                return;
            }
            
            // Filter by species if selected
            if (currentSpeciesFilter) {
                filteredBirds = allbirds.filter(b => getSpecies(b.english) === currentSpeciesFilter);
            } else {
                filteredBirds = [...allbirds];
            }
            
            // Sort by selected language
            filteredBirds.sort((a, b) => {
                const nameA = currentLanguage === 'af' ? a.afrikaans : a.english;
                const nameB = currentLanguage === 'af' ? b.afrikaans : b.english;
                return nameA.localeCompare(nameB);
            });
            
            // Clear and repopulate
            const placeholder = currentLanguage === 'af' ? 'Kies \'n voël...' : 'Select a bird...';
            selector.innerHTML = `<option value="">${placeholder}</option>`;
            
            filteredBirds.forEach((bird, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = currentLanguage === 'af' ? bird.afrikaans : bird.english;
                selector.appendChild(option);
            });
        }
        
        // Select bird
        document.getElementById('birdSelector').addEventListener('change', function() {
            const index = this.value;
            if (index === '') {
                document.getElementById('birdDisplay').style.display = 'none';
                return;
            }
            
            currentBird = filteredBirds[index];
            currentBirdIndex = parseInt(index);
            displayBird();
        });
        
        let currentBirdIndex = -1;
        
        function nextBird() {
            if (!filteredBirds || filteredBirds.length === 0) return;
            currentBirdIndex = (currentBirdIndex + 1) % filteredBirds.length;
            currentBird = filteredBirds[currentBirdIndex];
            document.getElementById('birdSelector').value = currentBirdIndex;
            displayBird();
        }
        
        // Display bird
        function displayBird() {
            if (!currentBird) return;
            
            const mainName = currentLanguage === 'af' ? currentBird.afrikaans : currentBird.english;
            const altName = currentLanguage === 'af' ? currentBird.english : currentBird.afrikaans;
            document.getElementById('birdName').textContent = mainName;
            document.getElementById('birdNameAfr').textContent = altName;
            
            // Display credit info
            const creditHTML = `
                <strong>Credit:</strong> ${currentBird.credit}<br>
                <strong>License:</strong> <a href="${currentBird.licenseLink}" target="_blank">View License</a><br>
                <strong>Changes:</strong> ${currentBird.changes}
            `;
            document.getElementById('birdCredit').innerHTML = creditHTML;
            
            // Generate scrollable spectrogram from audio
            generateSpectrogramForBird(currentBird.audio);
            
            // Load audio and auto-play
            audio.src = currentBird.audio;
            audio.play();
            
            // Show bird photo if available
            const photoContainer = document.getElementById('birdPhotoContainer');
            const photoImg = document.getElementById('birdPhoto');
            const photoCredit = document.getElementById('birdPhotoCredit');
            if (currentBird.image) {
                photoImg.onload = function() {
                    photoContainer.style.display = 'block';
                };
                photoImg.onerror = function() {
                    photoContainer.style.display = 'none';
                };
                photoImg.src = currentBird.image;
                photoCredit.textContent = currentBird.photographer ? '© ' + currentBird.photographer : '';
            } else {
                photoContainer.style.display = 'none';
            }
            
            document.getElementById('birdDisplay').style.display = 'block';
        }
        
        // Spectrogram
        let spectrogramReady = false;
        let totalCanvasWidth = 0;
        const canvas = document.getElementById('spectrogramCanvas');
        const spectrogramLine = document.getElementById('spectrogramLine');
        const spectrogramOuter = document.getElementById('spectrogramOuter');
        const spectrogramScroll = document.getElementById('spectrogramScroll');
        const timeAxis = document.getElementById('timeAxis');
        
        async function generateSpectrogramForBird(audioSrc) {
            spectrogramReady = false;
            totalCanvasWidth = 0;
            
            const result = await generateScrollableSpectrogram(audioSrc, {
                canvas: canvas,
                scrollContainer: spectrogramScroll,
                line: spectrogramLine,
                timeAxis: timeAxis,
                outerContainer: spectrogramOuter,
                pxPerSec: 75,
                canvasHeight: 200,
                audioElement: audio
            });
            
            spectrogramReady = result.ready;
            totalCanvasWidth = result.totalWidth;
        }
        
        audio.addEventListener('timeupdate', function() {
            updateSpectrogramLine(audio, spectrogramLine, spectrogramScroll, totalCanvasWidth, spectrogramReady);
        });
        
        audio.addEventListener('play', function() {
            if (spectrogramReady) {
                spectrogramLine.style.display = 'block';
                updateSpectrogramLine(audio, spectrogramLine, spectrogramScroll, totalCanvasWidth, spectrogramReady);
            }
        });
        
        audio.addEventListener('ended', function() {
            spectrogramLine.style.display = 'none';
        });
        
        setupSpectrogramClick(spectrogramScroll, canvas, audio,
            function() { return totalCanvasWidth; },
            function() { return spectrogramReady; }
        );
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            populateSpeciesFilter();
            populateBirdSelector();
        });
    </script>
</body>
</html>
