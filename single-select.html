<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Bird Select</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            margin: 0;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1em;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .bird-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .bird-name {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .bird-name-afr {
            font-size: 1.5em;
            color: #666;
            font-style: italic;
            margin-bottom: 15px;
        }
        
        .bird-credit {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        
        .bird-credit a {
            color: #667eea;
            text-decoration: none;
        }
        
        .bird-credit a:hover {
            text-decoration: underline;
        }
        
        .spectrogram-wrapper {
            position: relative;
            margin: 15px 0;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 8px;
            max-height: 180px;
            overflow: hidden;
        }
        
        .spectrogram-wrapper canvas {
            width: 100%;
            max-height: 164px;
            display: block;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .spectrogram-line {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 2px;
            bottom: 8px;
            background-color: red;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        
        audio {
            width: 100%;
            margin-top: 20px;
        }
        
        .language-selector {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1em;
            background: white;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            select {
                width: 100%;
            }
            
            .bird-name {
                font-size: 1.5em;
            }
            
            .bird-name-afr {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Single Bird Select</h1>
            <button onclick="window.location.href='start.html'" class="btn">← Back</button>
        </div>
        
        <div class="controls">
            <select id="languageSelector" class="language-selector" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="af">Afrikaans</option>
            </select>
            <select id="birdSelector">
                <option value="">Select a bird...</option>
            </select>
        </div>
        
        <div id="birdDisplay" style="display: none;">
            <div class="bird-info">
                <div class="bird-name" id="birdName"></div>
                <div class="bird-name-afr" id="birdNameAfr"></div>
                <div class="bird-credit" id="birdCredit"></div>
            </div>
            
            <div class="spectrogram-wrapper" id="spectrogramWrapper" style="display: none;">
                <canvas id="spectrogramCanvas"></canvas>
                <div class="spectrogram-line" id="spectrogramLine"></div>
            </div>
            
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>
    
    <script src="allbirds.js"></script>
    <script src="interactive-spectrogram.js"></script>
    
    <script>
        let currentBird = null;
        let currentLanguage = 'en';
        let audio = document.getElementById('audioPlayer');
        
        // Change language
        function changeLanguage() {
            currentLanguage = document.getElementById('languageSelector').value;
            populateBirdSelector();
            if (currentBird) {
                displayBird();
            }
        }
        
        // Populate bird selector
        function populateBirdSelector() {
            const selector = document.getElementById('birdSelector');
            
            if (typeof allbirds === 'undefined' || !Array.isArray(allbirds)) {
                selector.innerHTML = '<option value="">No birds available</option>';
                return;
            }
            
            // Sort by selected language
            allbirds.sort((a, b) => {
                const nameA = currentLanguage === 'af' ? a.afrikaans : a.english;
                const nameB = currentLanguage === 'af' ? b.afrikaans : b.english;
                return nameA.localeCompare(nameB);
            });
            
            // Clear and repopulate
            const placeholder = currentLanguage === 'af' ? 'Kies \'n voël...' : 'Select a bird...';
            selector.innerHTML = `<option value="">${placeholder}</option>`;
            
            allbirds.forEach((bird, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = currentLanguage === 'af' ? bird.afrikaans : bird.english;
                selector.appendChild(option);
            });
        }
        
        // Select bird
        document.getElementById('birdSelector').addEventListener('change', function() {
            const index = this.value;
            if (index === '') {
                document.getElementById('birdDisplay').style.display = 'none';
                return;
            }
            
            currentBird = allbirds[index];
            displayBird();
        });
        
        // Display bird
        function displayBird() {
            if (!currentBird) return;
            
            const mainName = currentLanguage === 'af' ? currentBird.afrikaans : currentBird.english;
            const altName = currentLanguage === 'af' ? currentBird.english : currentBird.afrikaans;
            document.getElementById('birdName').textContent = mainName;
            document.getElementById('birdNameAfr').textContent = altName;
            
            // Display credit info
            const creditHTML = `
                <strong>Credit:</strong> ${currentBird.credit}<br>
                <strong>License:</strong> <a href="${currentBird.licenseLink}" target="_blank">View License</a><br>
                <strong>Changes:</strong> ${currentBird.changes}
            `;
            document.getElementById('birdCredit').innerHTML = creditHTML;
            
            // Load spectrogram
            loadSpectrogram(currentBird.spectrogram);
            
            // Load audio and auto-play
            audio.src = currentBird.audio;
            audio.play();
            
            document.getElementById('birdDisplay').style.display = 'block';
        }
        
        // Spectrogram
        let spectrogramImage = null;
        const canvas = document.getElementById('spectrogramCanvas');
        const ctx = canvas.getContext('2d');
        const spectrogramLine = document.getElementById('spectrogramLine');
        const spectrogramWrapper = document.getElementById('spectrogramWrapper');
        
        function loadSpectrogram(imageSrc) {
            if (!imageSrc) {
                spectrogramWrapper.style.display = 'none';
                return;
            }
            
            spectrogramImage = new Image();
            spectrogramImage.onload = function() {
                // Set canvas size - limit height to 160px
                const wrapperWidth = spectrogramWrapper.clientWidth - 16;
                const maxHeight = 160;
                const aspectRatio = spectrogramImage.height / spectrogramImage.width;
                let drawWidth = wrapperWidth;
                let drawHeight = wrapperWidth * aspectRatio;
                
                if (drawHeight > maxHeight) {
                    drawHeight = maxHeight;
                    drawWidth = maxHeight / aspectRatio;
                }
                
                canvas.width = drawWidth;
                canvas.height = drawHeight;
                
                // Draw spectrogram
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(spectrogramImage, 0, 0, canvas.width, canvas.height);
                
                spectrogramWrapper.style.display = 'block';
                
                // Show red line if audio is already playing
                if (!audio.paused && audio.duration) {
                    spectrogramLine.style.display = 'block';
                }
            };
            spectrogramImage.onerror = function() {
                spectrogramWrapper.style.display = 'none';
            };
            spectrogramImage.src = imageSrc;
        }
        
        // Update red line position
        function updateLinePosition() {
            if (!audio.duration || !spectrogramImage) return;
            if (spectrogramWrapper.style.display === 'none') return;
            
            const progress = audio.currentTime / audio.duration;
            const canvasRect = canvas.getBoundingClientRect();
            const wrapperRect = spectrogramWrapper.getBoundingClientRect();
            const offset = canvasRect.left - wrapperRect.left;
            const position = offset + (progress * canvasRect.width);
            
            spectrogramLine.style.left = position + 'px';
            spectrogramLine.style.display = 'block';
        }
        
        audio.addEventListener('timeupdate', updateLinePosition);
        
        // Show red line when playing
        audio.addEventListener('play', function() {
            if (spectrogramImage && spectrogramWrapper.style.display !== 'none') {
                spectrogramLine.style.display = 'block';
                updateLinePosition();
            }
        });
        
        // Keep line visible on pause
        audio.addEventListener('pause', function() {
            // line stays visible
        });
        
        // Hide line when ended
        audio.addEventListener('ended', function() {
            spectrogramLine.style.display = 'none';
        });
        
        // Click on spectrogram to seek
        canvas.addEventListener('click', function(e) {
            if (!audio.duration) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const progress = x / rect.width;
            audio.currentTime = progress * audio.duration;
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            populateBirdSelector();
        });
    </script>
</body>
</html>
