<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Sound ID - Start</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .mode-selection {
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }
        
        .mode-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .mode-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .mode-title {
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        
        .mode-description {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .mode-card {
                min-height: 100px;
                padding: 20px;
            }
            
            .mode-icon {
                font-size: 1.5em;
            }
            
            .mode-title {
                font-size: 1.1em;
            }
            
            .mode-description {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bird Sound ID</h1>
        
        <div class="mode-selection">
            <button class="mode-card" onclick="window.location.href='single-select.html'">
                <div class="mode-icon">🎵</div>
                <div class="mode-title">Single Bird Select</div>
                <div class="mode-description">Select and play any bird</div>
            </button>
            
            <button class="mode-card" onclick="window.location.href='learn.html'">
                <div class="mode-icon">📚</div>
                <div class="mode-title">Learning Mode</div>
                <div class="mode-description">Play birds by group or hotspot</div>
            </button>
            
            <button class="mode-card" onclick="window.location.href='index.html'">
                <div class="mode-icon">🎮</div>
                <div class="mode-title">Game Mode</div>
                <div class="mode-description">Test your knowledge</div>
            </button>
            
            <button class="mode-card" onclick="window.location.href='soundscape.html'">
                <div class="mode-icon">🌿</div>
                <div class="mode-title">Soundscape ID Training</div>
                <div class="mode-description">Identify birds in field recordings</div>
            </button>
        </div>
    </div>
</body>
</html>
