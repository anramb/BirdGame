<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            margin: 0;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        select {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 0.8em;
            min-width: 200px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        
        .current-bird {
            background: #f8f9fa;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .bird-name {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .bird-name-afr {
            font-size: 1.5em;
            color: #666;
            font-style: italic;
            margin-bottom: 15px;
        }
        
        .bird-credit {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        
        .bird-credit a {
            color: #667eea;
            text-decoration: none;
        }
        
        .bird-credit a:hover {
            text-decoration: underline;
        }
        
        #spectrogram-container {
            position: relative;
            margin: 20px 0;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #spectrogram-container canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        
        .progress-info {
            text-align: center;
            color: #666;
            margin-top: 10px;
        }
        
        .audio-player {
            width: 100%;
            margin-top: 15px;
        }
        
        .btn-pause {
            background: linear-gradient(135deg, #ffc107 0%, #ffca2c 100%);
            color: #333;
        }
        
        .language-selector {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1em;
            background: white;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            select, .btn {
                width: 100%;
            }
            
            .bird-name {
                font-size: 1.5em;
            }
            
            .bird-name-afr {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Learning Mode</h1>
            <button onclick="window.location.href='start.html'" class="btn">← Back</button>
        </div>
        
        <div class="controls">
            <select id="languageSelector" class="language-selector" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="af">Afrikaans</option>
            </select>
            <select id="filterType">
                <option value="all">All Birds</option>
                <option value="group">By Group</option>
                <option value="hotspot">By Hotspot</option>
                <option value="habitat">By Habitat</option>
            </select>
            <select id="filterValue" style="display: none;">
                <option value="">Select...</option>
            </select>
            <select id="subFilterHabitat" style="display: none;">
                <option value="">All Habitats</option>
            </select>
            <select id="levelFilter">
                <option value="">All Levels</option>
                <option value="1">Beginner</option>
                <option value="2">Intermediate</option>
                <option value="3">Advanced</option>
            </select>
            <button id="startBtn" onclick="startLearning()" class="btn">▶ Start</button>
            <button id="pauseBtn" onclick="pauseResume()" class="btn btn-pause" style="display: none;">⏸ Pause</button>
            <button id="skipBtn" onclick="skipToNext()" class="btn" style="display: none;">⏭ Skip</button>
            <button id="stopBtn" onclick="stopLearning()" class="btn btn-stop" style="display: none;">⏹ Stop</button>
        </div>
        
        <div id="learningDisplay" style="display: none;">
            <div class="current-bird">
                <div class="bird-name" id="birdName"></div>
                <div class="bird-name-afr" id="birdNameAfr"></div>
                <div class="bird-credit" id="birdCredit"></div>
            </div>
            
            <audio id="audioPlayer" class="audio-player" controls></audio>
            
            <div class="progress-info" id="progressInfo"></div>
        </div>
    </div>
    
    <script src="allbirds.js"></script>
    <script src="cisticolas.js"></script>
    <script src="gardenwoodland.js"></script>
    <script src="groundbirds.js"></script>
    <script src="LBJs.js"></script>
    <script src="other.js"></script>
    <script src="raptors.js"></script>
    <script src="seedeaters.js"></script>
    <script src="waders.js"></script>
    <script src="warblers.js"></script>
    <script src="waterbirds.js"></script>
    <script src="interactive-spectrogram.js"></script>
    
    <script>
        let playlist = [];
        let currentIndex = 0;
        let isPlaying = false;
        let isPaused = false;
        let currentLanguage = 'en';
        let audio = document.getElementById('audioPlayer');
        
        // Change language
        function changeLanguage() {
            currentLanguage = document.getElementById('languageSelector').value;
            updateFilterLabels();
        }
        
        // Update filter labels based on language
        function updateFilterLabels() {
            const filterType = document.getElementById('filterType');
            const levelFilter = document.getElementById('levelFilter');
            if (currentLanguage === 'af') {
                filterType.options[0].text = 'Alle Voëls';
                filterType.options[1].text = 'Per Groep';
                filterType.options[2].text = 'Per Hotspot';
                filterType.options[3].text = 'Per Habitat';
                levelFilter.options[0].text = 'Alle Vlakke';
                levelFilter.options[1].text = 'Beginner';
                levelFilter.options[2].text = 'Intermediêr';
                levelFilter.options[3].text = 'Gevorderd';
            } else {
                filterType.options[0].text = 'All Birds';
                filterType.options[1].text = 'By Group';
                filterType.options[2].text = 'By Hotspot';
                filterType.options[3].text = 'By Habitat';
                levelFilter.options[0].text = 'All Levels';
                levelFilter.options[1].text = 'Beginner';
                levelFilter.options[2].text = 'Intermediate';
                levelFilter.options[3].text = 'Advanced';
            }
        }
        
        const allData = {
            cisticolas: typeof cisticolas !== 'undefined' ? cisticolas : [],
            gardenwoodland: typeof gardenwoodland !== 'undefined' ? gardenwoodland : [],
            groundbirds: typeof groundbirds !== 'undefined' ? groundbirds : [],
            LBJs: typeof LBJs !== 'undefined' ? LBJs : [],
            other: typeof other !== 'undefined' ? other : [],
            raptors: typeof raptors !== 'undefined' ? raptors : [],
            seedeaters: typeof seedeaters !== 'undefined' ? seedeaters : [],
            waders: typeof waders !== 'undefined' ? waders : [],
            warblers: typeof warblers !== 'undefined' ? warblers : [],
            waterbirds: typeof waterbirds !== 'undefined' ? waterbirds : []
        };
        
        // Helper: get all birds from allbirds
        function getAllBirds() {
            return typeof allbirds !== 'undefined' ? allbirds : [];
        }
        
        // Helper: get unique values from a semicolon-separated field
        function getUniqueValues(birdsArray, field) {
            const values = new Set();
            birdsArray.forEach(bird => {
                if (bird[field]) {
                    bird[field].split(';').forEach(v => {
                        const trimmed = v.trim();
                        if (trimmed) values.add(trimmed);
                    });
                }
            });
            return Array.from(values).sort();
        }
        
        // Update sub-filter habitat when hotspot selection changes
        function updateSubFilterHabitat() {
            const subFilter = document.getElementById('subFilterHabitat');
            const hotspotValue = document.getElementById('filterValue').value;
            
            subFilter.innerHTML = '<option value="">' + (currentLanguage === 'af' ? 'Alle Habitats' : 'All Habitats') + '</option>';
            
            if (!hotspotValue) return;
            
            // Get birds that match this hotspot
            const matchingBirds = getAllBirds().filter(bird => 
                bird.hotspot && bird.hotspot.split(';').some(s => s.trim() === hotspotValue)
            );
            
            // Get unique habitats from those birds
            getUniqueValues(matchingBirds, 'habitat').forEach(hab => {
                const option = document.createElement('option');
                option.value = hab;
                option.textContent = hab;
                subFilter.appendChild(option);
            });
        }
        
        // Update filter options
        document.getElementById('filterType').addEventListener('change', function() {
            const filterValue = document.getElementById('filterValue');
            const subFilterHabitat = document.getElementById('subFilterHabitat');
            const type = this.value;
            
            // Hide sub-filter by default
            subFilterHabitat.style.display = 'none';
            
            if (type === 'all') {
                filterValue.style.display = 'none';
                return;
            }
            
            filterValue.style.display = 'block';
            filterValue.innerHTML = '<option value="">' + (currentLanguage === 'af' ? 'Kies...' : 'Select...') + '</option>';
            
            if (type === 'group') {
                Object.keys(allData).forEach(group => {
                    const option = document.createElement('option');
                    option.value = group;
                    option.textContent = group.charAt(0).toUpperCase() + group.slice(1);
                    filterValue.appendChild(option);
                });
            } else if (type === 'hotspot') {
                getUniqueValues(getAllBirds(), 'hotspot').forEach(spot => {
                    const option = document.createElement('option');
                    option.value = spot;
                    option.textContent = spot;
                    filterValue.appendChild(option);
                });
                // Show sub-filter for habitat within hotspot
                subFilterHabitat.style.display = 'block';
                subFilterHabitat.innerHTML = '<option value="">' + (currentLanguage === 'af' ? 'Alle Habitats' : 'All Habitats') + '</option>';
            } else if (type === 'habitat') {
                getUniqueValues(getAllBirds(), 'habitat').forEach(hab => {
                    const option = document.createElement('option');
                    option.value = hab;
                    option.textContent = hab;
                    filterValue.appendChild(option);
                });
            }
        });
        
        // When hotspot value changes, update the habitat sub-filter
        document.getElementById('filterValue').addEventListener('change', function() {
            const filterType = document.getElementById('filterType').value;
            if (filterType === 'hotspot') {
                updateSubFilterHabitat();
            }
        });
        
        // Start learning
        function startLearning() {
            // If paused, resume instead of restarting
            if (isPaused) {
                isPaused = false;
                isPlaying = true;
                audio.play();
                document.getElementById('pauseBtn').textContent = '⏸ Pause';
                document.getElementById('pauseBtn').classList.remove('btn-pause');
                document.getElementById('pauseBtn').classList.add('btn-pause');
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';
                return;
            }
            
            const filterType = document.getElementById('filterType').value;
            const filterValue = document.getElementById('filterValue').value;
            const subHabitat = document.getElementById('subFilterHabitat').value;
            const levelValue = document.getElementById('levelFilter').value;
            
            // Build playlist
            playlist = [];
            
            if (filterType === 'all') {
                playlist = [...getAllBirds()];
            } else if (filterType === 'group') {
                if (filterValue && allData[filterValue]) {
                    playlist = [...allData[filterValue]];
                }
            } else if (filterType === 'hotspot') {
                if (filterValue) {
                    playlist = getAllBirds().filter(bird => 
                        bird.hotspot && bird.hotspot.split(';').some(s => s.trim() === filterValue)
                    );
                    // Apply sub-filter for habitat within hotspot
                    if (subHabitat) {
                        playlist = playlist.filter(bird =>
                            bird.habitat && bird.habitat.split(';').some(h => h.trim() === subHabitat)
                        );
                    }
                }
            } else if (filterType === 'habitat') {
                if (filterValue) {
                    playlist = getAllBirds().filter(bird => 
                        bird.habitat && bird.habitat.split(';').some(h => h.trim() === filterValue)
                    );
                }
            }
            
            // Apply level filter
            if (levelValue && playlist.length > 0) {
                playlist = playlist.filter(bird => 
                    bird.level && bird.level.startsWith(levelValue)
                );
            }
            
            if (playlist.length === 0) {
                alert('No birds found for this selection');
                return;
            }
            
            // Shuffle playlist
            playlist = playlist.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            isPlaying = true;
            isPaused = false;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
            document.getElementById('skipBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('learningDisplay').style.display = 'block';
            
            playNext();
        }
        
        // Pause / Resume
        function pauseResume() {
            if (isPaused) {
                // Resume
                isPaused = false;
                isPlaying = true;
                audio.play();
                document.getElementById('pauseBtn').textContent = '⏸ Pause';
            } else {
                // Pause
                isPaused = true;
                isPlaying = false;
                audio.pause();
                document.getElementById('pauseBtn').textContent = '▶ Resume';
            }
        }
        
        // Play next bird
        function playNext() {
            if (!isPlaying) return;
            
            if (currentIndex >= playlist.length) {
                // Loop back to start
                currentIndex = 0;
            }
            
            const bird = playlist[currentIndex];
            
            // Display bird name in selected language
            const birdName = currentLanguage === 'af' ? bird.afrikaans : bird.english;
            const birdNameAlt = currentLanguage === 'af' ? bird.english : bird.afrikaans;
            
            document.getElementById('birdName').textContent = birdName;
            document.getElementById('birdNameAfr').textContent = birdNameAlt;
            
            // Display credit info
            const creditHTML = `
                <strong>Credit:</strong> ${bird.credit}<br>
                <strong>License:</strong> <a href="${bird.licenseLink}" target="_blank">View License</a><br>
                <strong>Changes:</strong> ${bird.changes}
            `;
            document.getElementById('birdCredit').innerHTML = creditHTML;
            
            document.getElementById('progressInfo').textContent = 
                `Bird ${currentIndex + 1} of ${playlist.length}`;
            
            // Load audio
            audio.src = bird.audio;
            audio.play();
            
            currentIndex++;
        }
        
        // Skip to next bird
        function skipToNext() {
            if (isPlaying) {
                audio.pause();
                playNext();
            }
        }
        
        // Stop learning
        function stopLearning() {
            isPlaying = false;
            isPaused = false;
            audio.pause();
            audio.currentTime = 0;
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('skipBtn').style.display = 'none';
            document.getElementById('learningDisplay').style.display = 'none';
        }
        
        // Auto-advance to next bird when audio ends
        audio.addEventListener('ended', function() {
            if (isPlaying && !isPaused) {
                setTimeout(playNext, 1000);
            }
        });
    </script>
    
    <div style="position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 8px; background: rgba(255,255,255,0.9); color: #666; font-size: 0.7em; z-index: 1000;">Created by Marna Buys with Windsurf</div>
</body>
</html>
